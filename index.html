<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>Generator Pembayaran Kris Dinamis</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  input { padding: 10px; font-size: 1em; width: 200px; }
  button { padding: 10px; font-size: 1em; margin-left: 10px; }
  #output { margin-top: 20px; }
</style>
</head>
<body>
<h2>Isi Nominal Pembayaran</h2>
<p>Minimal Rp 20.000</p>
<input type="number" id="nominal" placeholder="Masukkan nominal" />
<button onclick="generate()">Buat QR & Link</button>

<div id="output">
  <p>Link Kris:</p>
  <a id="linkKris" href="" target="_blank"></a>
  <p>QR Code:</p>
  <canvas id="qrcode" width="200" height="200"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
function generate() {
  const nominal = document.getElementById('nominal').value;
  const krisID = '00020101021126570011ID.DANA.WWW011893600915302405147802090240514780303UMI51440014ID.CO.QRIS.WWW0215ID10265091908350303UMI5204581253033605802ID5915Angkringan Kita6015Kab. Muara Enim6105313536304B1A6'; // Ganti dengan ID Kris Anda
  if (!nominal || nominal < 20000) {
    alert('Minimal Rp 20.000');
    return;
  }
  // Buat link sesuai format Kris Anda
  const urlKris = `https://kris.com/pay?kris_id=${krisID}&amount=${nominal}`;

  // Tampilkan link
  const linkElement = document.getElementById('linkKris');
  linkElement.href = urlKris;
  linkElement.textContent = urlKris;

  // Generate QR code
  QRCode.toCanvas(document.getElementById('qrcode'), urlKris, { width: 200 }, function (error) {
    if (error) console.error(error);
  });
}
</script>
</body>
</html>
