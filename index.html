<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drac-X | Penarikan Dana</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Drac-X</h1>
      <p>Form Penarikan Dana</p>
    </div>

    <form id="formPenarikan" action="kirim.php" method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required placeholder="Masukkan username">
      </div>

      <div class="form-group">
        <label>Nama Akun</label>
        <input type="text" name="nama_akun" required placeholder="Masukkan nama akun">
      </div>

      <div class="form-group">
        <label>Bank Tujuan</label>
        <select name="bank_tujuan" required>
          <option value="">-- Pilih Bank / E-Wallet --</option>
          <optgroup label="Bank">
            <option value="BCA">BCA</option>
            <option value="BRI">BRI</option>
            <option value="BNI">BNI</option>
            <option value="Mandiri">Mandiri</option>
            <option value="CIMB Niaga">CIMB Niaga</option>
            <option value="Danamon">Danamon</option>
            <option value="Permata">Permata</option>
            <option value="BSI">BSI</option>
            <option value="BTN">BTN</option>
            <option value="Mega">Mega</option>
            <option value="Panin">Panin</option>
            <option value="Bank Jago">Bank Jago</option>
            <option value="SeaBank">SeaBank</option>
            <option value="Neo Commerce">Neo Commerce</option>
            <option value="Allo Bank">Allo Bank</option>
          </optgroup>
          <optgroup label="E-Wallet">
            <option value="DANA">DANA</option>
            <option value="OVO">OVO</option>
            <option value="GoPay">GoPay</option>
            <option value="ShopeePay">ShopeePay</option>
            <option value="LinkAja">LinkAja</option>
            <option value="Sakuku">Sakuku</option>
          </optgroup>
        </select>
      </div>

      <div class="form-group">
        <label>Nama Akun Bank</label>
        <input type="text" name="nama_akun_bank" required placeholder="Nama pemilik rekening">
      </div>

      <div class="form-group">
        <label>Nomor Rekening</label>
        <input type="text" name="nomor_rekening" required placeholder="Masukkan nomor rekening" inputmode="numeric">
      </div>

      <div class="form-group">
        <label>Nominal Penarikan</label>
        <input type="number" name="nominal" required placeholder="Minimal Rp20.000" min="20000">
        <small class="info">Minimal penarikan Rp20.000</small>
      </div>

      <button type="submit" class="btn-submit">Ajukan Penarikan</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
